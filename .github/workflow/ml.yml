name: SIA Speaker Identification ML Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ml-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas librosa scikit-learn matplotlib joblib soundfile dvc

      - name: Verify Project Structure
        run: |
          ls
          ls src
          ls models || true
          ls plots || true

      - name: Run DVC Pipeline
        run: |
          dvc repro || echo "DVC repro skipped because dataset/model artifacts are not available in GitHub runner"

      - name: Validate Python Files
        run: |
          python -m py_compile src/extract_features.py
          python -m py_compile src/train_model.py
          python -m py_compile src/evaluate_model.py
          python -m py_compile src/predict.py

      - name: CI Success
        run: echo "SIA Speaker Identification CI pipeline completed successfully"